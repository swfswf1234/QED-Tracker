# ============================================
# QED-Tracker v0.2 配置示例
# 复制为 setting.ini 并修改实际值
# ============================================

[Core]
dataset_dir = dataset
log_level = INFO

[Database]
engine = mysql              # mysql / postgresql
host = localhost
port = 3306
database = qed_tracker
user = root
password =

[Proxy]
http = http://127.0.0.1:7897

[Discovery]
arxiv_math_domains = math.CA, math.FA, math.AP, math.CV
arxiv_llm_domains = cs.LG, cs.CL, cs.CV, cs.AI

[GitHub]
# 可选：从环境变量读取 GITHUB_TOKEN 更安全
token =

[LLM]
local_api_base = http://127.0.0.1:5001/v1
local_api_key = lm-studio
local_model = qwen/qwen3.5-9b

[API]
host = 0.0.0.0
port = 8001
